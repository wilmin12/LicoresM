<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppliers - Licores Maduro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../../css/main.css" />
</head>
<body>
<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;"></div>
<div class="app-wrapper">
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header"><img src="../../img/LogoLicores.png" alt="Licores Maduro" class="sidebar-logo-img"/><span class="sidebar-logo-text">LICORES MADURO</span></div>
    <div id="sidebar-nav" class="sidebar-nav"></div>
    <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar" id="sidebar-user-initials">LM</div><div class="sidebar-text"><div id="sidebar-user-name" style="font-weight:600;">–</div></div></div></div>
  </nav>
  <div class="main-area">
    <header class="topbar">
      <button id="btn-sidebar-toggle" class="btn-sidebar-toggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title"><i class="fas fa-boxes me-2 text-wine"></i>Suppliers</span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
            <span class="sidebar-avatar" id="topbar-user-initials" style="width:28px;height:28px;font-size:.75rem;">LM</span>
            <span id="topbar-user-name" class="d-none d-md-inline">–</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm">
            <li><div class="dropdown-header"><strong id="topbar-user-fullname">User</strong><br/><small class="text-muted" id="topbar-user-role">Role</small></div></li>
            <li><hr class="dropdown-divider"/></li>
            <li><a class="dropdown-item text-danger" href="#" id="btn-logout"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </header>
    <main class="page-content">
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="fas fa-home me-1"></i>Home</a></li>
          <li class="breadcrumb-item"><a href="index.html">Freight Forwarder</a></li>
          <li class="breadcrumb-item active">Suppliers</li>
        </ol>
      </nav>
      <div class="page-title">Suppliers</div>
      <div class="page-subtitle">Supplier catalog from VIP (read-only).</div>

      <div class="card mb-3">
        <div class="card-body d-flex flex-wrap align-items-center gap-2 py-2">
          <div class="search-wrapper flex-grow-1">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" class="form-control form-control-sm" placeholder="Search by code or name..."/>
          </div>
          <div class="form-check form-switch ms-2 mb-0">
            <input class="form-check-input" type="checkbox" id="show-deleted"/>
            <label class="form-check-label small" for="show-deleted">Show deleted</label>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span><i class="fas fa-boxes me-2"></i>Suppliers</span>
          <span class="badge" style="background:var(--primary);color:#fff;" id="total-count">0 records</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Code</th>
                  <th>Name</th>
                  <th>AP Vendor</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="data-tbody">
                <tr><td colspan="5" class="text-center py-4 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="card-footer d-flex align-items-center justify-content-between flex-wrap gap-2">
          <small class="text-muted" id="page-info">Page 1</small>
          <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-container"><div id="toast" class="toast align-items-center text-white border-0" role="alert"><div class="d-flex"><div class="toast-body" id="toast-msg"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/i18n.js"></script><script src="../../js/api.js"></script><script src="../../js/auth.js"></script><script src="../../js/sidebar.js"></script>
<script>
  let allItems = [], filtered = [], currentPage = 1;
  const PAGE_SIZE = 20;

  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.requireAuth()) return;
    Auth.startExpiryWatcher();
    Auth.populateUserUI();
    Sidebar.init();
    document.getElementById('btn-logout').addEventListener('click', e => { e.preventDefault(); Auth.logout(); });
    document.getElementById('search-input').addEventListener('input', filterAndRender);
    document.getElementById('show-deleted').addEventListener('change', loadData);
    await loadData();
  });

  async function loadData() {
    const inclDeleted = document.getElementById('show-deleted').checked;
    try {
      const res = await API.catalogs.suppliers.getAll({ pageSize: 500, includeDeleted: inclDeleted });
      allItems = res?.Data || res || [];
      filterAndRender();
    } catch(err) { showToast(err.message, 'danger'); }
  }

  function filterAndRender() {
    const q = document.getElementById('search-input').value.toLowerCase();
    filtered = allItems.filter(r =>
      (r.Code||'').toLowerCase().includes(q) ||
      (r.Name||'').toLowerCase().includes(q)
    );
    currentPage = 1;
    renderTable();
    renderPagination();
  }

  function renderTable() {
    const tbody = document.getElementById('data-tbody');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);
    document.getElementById('total-count').textContent = filtered.length + ' records';
    if (!page.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted">No records found.</td></tr>`;
      return;
    }
    tbody.innerHTML = page.map((r, i) => `
      <tr>
        <td>${start + i + 1}</td>
        <td><strong>${esc(r.Code)}</strong></td>
        <td>${esc(r.Name)}</td>
        <td><small class="text-muted">${r.ApVendor ?? '–'}</small></td>
        <td><span class="${r.IsDeleted ? 'badge-inactive' : 'badge-active'}">${r.IsDeleted ? 'Deleted' : 'Active'}</span></td>
      </tr>`).join('');
  }

  function renderPagination() {
    const total = Math.ceil(filtered.length / PAGE_SIZE) || 1;
    document.getElementById('page-info').textContent = `Page ${currentPage} of ${total}`;
    let html = `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" href="#" onclick="event.preventDefault();gotoPage(${currentPage-1})">&#8249;</a></li>`;
    for (let p = 1; p <= total; p++)
      html += `<li class="page-item ${p===currentPage?'active':''}"><a class="page-link" href="#" onclick="event.preventDefault();gotoPage(${p})">${p}</a></li>`;
    html += `<li class="page-item ${currentPage>=total?'disabled':''}"><a class="page-link" href="#" onclick="event.preventDefault();gotoPage(${currentPage+1})">&#8250;</a></li>`;
    document.getElementById('pagination').innerHTML = html;
  }

  function gotoPage(p) { const t=Math.ceil(filtered.length/PAGE_SIZE)||1; if(p<1||p>t)return; currentPage=p; renderTable(); renderPagination(); }
  function showToast(msg,type='success'){const el=document.getElementById('toast');el.className=`toast align-items-center text-white border-0 bg-${type==='success'?'success':'danger'}`;document.getElementById('toast-msg').textContent=msg;new bootstrap.Toast(el,{delay:3500}).show();}
  function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
