<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Licores Maduro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    .avatar-wrapper {
      position: relative;
      width: 110px; height: 110px;
      margin: 0 auto 1rem;
    }
    .avatar-wrapper .avatar-img {
      width: 110px; height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
    }
    .avatar-wrapper .avatar-initials {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: var(--gold);
      color: #fff;
      font-size: 2.2rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid var(--primary);
    }
    .avatar-wrapper .avatar-edit-btn {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: .75rem;
      transition: background .2s;
    }
    .avatar-wrapper .avatar-edit-btn:hover { background: var(--wine); }
    #avatar-file-input { display: none; }
    .profile-card { max-width: 520px; margin: 0 auto; }
  </style>
</head>
<body>
<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;"></div>
<div class="app-wrapper">
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <img src="../img/LogoLicores.png" alt="Licores Maduro" class="sidebar-logo-img"/>
      <span class="sidebar-logo-text">LICORES MADURO</span>
    </div>
    <div id="sidebar-nav" class="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-user-initials">LM</div>
        <div class="sidebar-text"><div id="sidebar-user-name" style="font-weight:600;">–</div></div>
      </div>
    </div>
  </nav>

  <div class="main-area">
    <header class="topbar">
      <button id="btn-sidebar-toggle" class="btn-sidebar-toggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title"><i class="fas fa-user-circle me-2 text-wine"></i>My Profile</span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
            <span class="sidebar-avatar" id="topbar-user-initials" style="width:28px;height:28px;font-size:.75rem;">LM</span>
            <span id="topbar-user-name" class="d-none d-md-inline">–</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm">
            <li><div class="dropdown-header"><strong id="topbar-user-fullname">User</strong><br/><small class="text-muted" id="topbar-user-role">Role</small></div></li>
            <li><hr class="dropdown-divider"/></li>
            <li><a class="dropdown-item text-danger" href="#" id="btn-logout"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </header>

    <main class="page-content">
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../dashboard.html"><i class="fas fa-home me-1"></i>Home</a></li>
          <li class="breadcrumb-item active">My Profile</li>
        </ol>
      </nav>
      <div class="page-title">My Profile</div>
      <div class="page-subtitle">Manage your account information and profile photo.</div>

      <div class="profile-card">

        <!-- Photo card -->
        <div class="card mb-4">
          <div class="card-body text-center py-4">
            <div class="avatar-wrapper">
              <div id="avatar-display"></div>
              <button class="avatar-edit-btn" id="btn-edit-avatar" title="Change photo">
                <i class="fas fa-camera"></i>
              </button>
              <input type="file" id="avatar-file-input" accept="image/jpeg,image/png,image/gif,image/webp" />
            </div>
            <div id="avatar-upload-status" class="small mt-1" style="min-height:1.4em;"></div>
            <h5 class="mb-0 mt-2" id="profile-fullname">–</h5>
            <small class="text-muted" id="profile-role">–</small>
          </div>
        </div>

        <!-- Info card -->
        <div class="card mb-4">
          <div class="card-header"><i class="fas fa-info-circle me-2"></i>Account Information</div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label text-muted small">Username</label>
                <div class="fw-semibold" id="profile-username">–</div>
              </div>
              <div class="col-12">
                <label class="form-label text-muted small">Full Name</label>
                <div class="fw-semibold" id="profile-name">–</div>
              </div>
              <div class="col-12">
                <label class="form-label text-muted small">Email</label>
                <div class="fw-semibold" id="profile-email">–</div>
              </div>
              <div class="col-12">
                <label class="form-label text-muted small">Role</label>
                <div class="fw-semibold" id="profile-role-info">–</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Change password card -->
        <div class="card mb-4">
          <div class="card-header"><i class="fas fa-lock me-2"></i>Change Password</div>
          <div class="card-body">
            <form id="pwd-form" novalidate>
              <div class="mb-3">
                <label class="form-label">Current Password <span class="text-danger">*</span></label>
                <input type="password" id="f-current-pwd" class="form-control" required />
                <div class="invalid-feedback">Required.</div>
              </div>
              <div class="mb-3">
                <label class="form-label">New Password <span class="text-danger">*</span></label>
                <input type="password" id="f-new-pwd" class="form-control" required minlength="6" />
                <div class="invalid-feedback">Minimum 6 characters.</div>
              </div>
              <div class="mb-3">
                <label class="form-label">Confirm New Password <span class="text-danger">*</span></label>
                <input type="password" id="f-confirm-pwd" class="form-control" required />
                <div class="invalid-feedback">Passwords do not match.</div>
              </div>
              <button type="button" class="btn btn-wine btn-sm" id="btn-change-pwd">
                <i class="fas fa-key me-1"></i>Change Password
              </button>
            </form>
          </div>
        </div>

      </div><!-- /.profile-card -->
    </main>
  </div>
</div>

<div class="toast-container">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!Auth.requireAuth()) return;
    Auth.startExpiryWatcher();
    Auth.populateUserUI();
    Sidebar.init();

    document.getElementById('btn-logout').addEventListener('click', e => { e.preventDefault(); Auth.logout(); });
    document.getElementById('btn-edit-avatar').addEventListener('click', () => document.getElementById('avatar-file-input').click());
    document.getElementById('avatar-file-input').addEventListener('change', handleAvatarChange);
    document.getElementById('btn-change-pwd').addEventListener('click', changePassword);

    loadProfile();
  });

  function loadProfile() {
    const user = Auth.getCurrentUser();
    if (!user) return;

    document.getElementById('profile-fullname').textContent  = user.FullName || user.Username;
    document.getElementById('profile-role').textContent      = user.RoleName || '';
    document.getElementById('profile-username').textContent  = user.Username;
    document.getElementById('profile-name').textContent      = user.FullName;
    document.getElementById('profile-email').textContent     = user.Email;
    document.getElementById('profile-role-info').textContent = user.RoleName;

    renderAvatar(user);
  }

  function renderAvatar(user) {
    const el = document.getElementById('avatar-display');
    if (user?.AvatarUrl) {
      el.innerHTML = `<img src="${user.AvatarUrl}?t=${Date.now()}" class="avatar-img" alt="Avatar" />`;
    } else {
      const initials = Auth.getUserInitials();
      el.innerHTML = `<div class="avatar-initials">${initials}</div>`;
    }
  }

  async function handleAvatarChange(e) {
    const file = e.target.files[0];
    if (!file) return;

    const status = document.getElementById('avatar-upload-status');
    status.className = 'small mt-1 text-muted';
    status.textContent = 'Uploading...';

    const user = Auth.getCurrentUser();
    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await API.users.uploadAvatar(user.UserId, formData);
      const avatarUrl = res?.Data?.AvatarUrl || res?.AvatarUrl;

      // Update sessionStorage so all pages reflect the new avatar immediately
      Auth.updateStoredUser({ AvatarUrl: avatarUrl });

      // Refresh UI
      Auth.populateUserUI();
      renderAvatar({ AvatarUrl: avatarUrl });

      status.className = 'small mt-1 text-success';
      status.textContent = 'Photo updated!';
      setTimeout(() => { status.textContent = ''; }, 3000);
    } catch (err) {
      status.className = 'small mt-1 text-danger';
      status.textContent = err.message;
    }

    // Reset input so same file can be re-selected
    e.target.value = '';
  }

  async function changePassword() {
    const cur     = document.getElementById('f-current-pwd');
    const nw      = document.getElementById('f-new-pwd');
    const confirm = document.getElementById('f-confirm-pwd');
    let valid = true;

    [cur, nw, confirm].forEach(el => el.classList.remove('is-invalid'));

    if (!cur.value)          { cur.classList.add('is-invalid');     valid = false; }
    if (nw.value.length < 6) { nw.classList.add('is-invalid');      valid = false; }
    if (nw.value !== confirm.value) { confirm.classList.add('is-invalid'); valid = false; }
    if (!valid) return;

    try {
      const user = Auth.getCurrentUser();
      await API.users.changePassword(user.UserId, {
        CurrentPassword:    cur.value,
        NewPassword:        nw.value,
        ConfirmNewPassword: confirm.value
      });
      document.getElementById('pwd-form').reset();
      showToast('Password changed successfully.', 'success');
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }

  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.className = `toast align-items-center text-white border-0 bg-${type === 'success' ? 'success' : 'danger'}`;
    document.getElementById('toast-msg').textContent = msg;
    new bootstrap.Toast(el, { delay: 3500 }).show();
  }
</script>
</body>
</html>
