<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management - Licores Maduro</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;"></div>

<div class="app-wrapper">

  <!-- Sidebar -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <img src="../img/LogoLicores.png" alt="Licores Maduro" class="sidebar-logo-img"/>
      <span class="sidebar-logo-text">LICORES MADURO</span>
    </div>
    <div id="sidebar-nav" class="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-user-initials">LM</div>
        <div class="sidebar-text"><div id="sidebar-user-name" style="font-weight:600;">–</div></div>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <button id="btn-sidebar-toggle" class="btn-sidebar-toggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title"><i class="fas fa-users me-2 text-wine"></i>User Management</span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span id="topbar-user-name" class="text-muted small d-none d-md-inline">–</span>
        <button class="btn btn-sm btn-outline-secondary" id="btn-logout">
          <i class="fas fa-sign-out-alt me-1"></i>Logout
        </button>
      </div>
    </header>

    <main class="page-content">
      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../dashboard.html">Dashboard</a></li>
          <li class="breadcrumb-item active">Users</li>
        </ol>
      </nav>

      <div class="page-title">User Management</div>
      <div class="page-subtitle">Create, edit and manage system users and their roles.</div>

      <!-- Toolbar -->
      <div class="card mb-3">
        <div class="card-body d-flex flex-wrap align-items-center gap-2 py-2">
          <div class="search-wrapper flex-grow-1">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" class="form-control form-control-sm"
                   placeholder="Search users..." />
          </div>
          <button class="btn btn-wine btn-sm ms-auto" id="btn-create-user">
            <i class="fas fa-plus me-1"></i>New User
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span><i class="fas fa-table me-2"></i>Users</span>
          <span class="badge" style="background:var(--primary);color:#fff;" id="total-count">0 records</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Username</th>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Last Login</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="8" class="text-center py-4 text-muted">
                  <i class="fas fa-spinner fa-spin me-2"></i>Loading...
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- ── Create / Edit User Modal ──────────────────────────────────────────────── -->
<div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="userModalLabel"><i class="fas fa-user me-2"></i>User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="user-form" novalidate>
          <input type="hidden" id="edit-user-id" value="" />
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Username <span class="text-danger">*</span></label>
              <input type="text" id="f-username" class="form-control" required maxlength="50" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Full Name <span class="text-danger">*</span></label>
              <input type="text" id="f-fullname" class="form-control" required maxlength="100" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Email <span class="text-danger">*</span></label>
              <input type="email" id="f-email" class="form-control" required maxlength="100" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Role <span class="text-danger">*</span></label>
              <select id="f-role" class="form-select" required>
                <option value="">-- Select Role --</option>
              </select>
            </div>
            <div class="col-md-6" id="password-field">
              <label class="form-label">Password <span class="text-danger">*</span></label>
              <input type="password" id="f-password" class="form-control" maxlength="128" />
              <div class="form-text">Leave blank when editing to keep current password.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Status</label>
              <div class="form-check form-switch mt-2">
                <input class="form-check-input" type="checkbox" id="f-active" checked />
                <label class="form-check-label" for="f-active">Active</label>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-wine btn-sm" id="btn-save-user">
          <i class="fas fa-save me-1"></i>Save User
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Change Password Modal ──────────────────────────────────────────────────── -->
<div class="modal fade" id="pwdModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-key me-2"></i>Change Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="pwd-user-id" />
        <div class="mb-3">
          <label class="form-label">Current Password</label>
          <input type="password" id="pwd-current" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" id="pwd-new" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input type="password" id="pwd-confirm" class="form-control" />
        </div>
        <div id="pwd-error" class="alert alert-danger d-none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-wine btn-sm" id="btn-save-password">
          <i class="fas fa-save me-1"></i>Change Password
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  let allUsers = [];
  let roles    = [];
  const userModal = () => new bootstrap.Modal('#userModal');
  const pwdModal  = () => new bootstrap.Modal('#pwdModal');

  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.requireAuth()) return;
    Auth.startExpiryWatcher();
    Auth.populateUserUI();
    Sidebar.init();

    document.getElementById('btn-logout').addEventListener('click', e => { e.preventDefault(); Auth.logout(); });
    document.getElementById('btn-create-user').addEventListener('click', openCreateModal);
    document.getElementById('btn-save-user').addEventListener('click', saveUser);
    document.getElementById('btn-save-password').addEventListener('click', savePassword);
    document.getElementById('search-input').addEventListener('input', filterTable);

    await loadRoles();
    await loadUsers();
  });

  async function loadUsers() {
    try {
      const res = await API.users.getAll();
      allUsers = res?.Data || [];
      renderTable(allUsers);
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }

  async function loadRoles() {
    try {
      const res = await API.roles.getAll();
      roles = res?.Data || [];
      const sel = document.getElementById('f-role');
      sel.innerHTML = '<option value="">-- Select Role --</option>'
        + roles.map(r => `<option value="${r.RoleId}">${r.RoleName}</option>`).join('');
    } catch { /* ignore */ }
  }

  function renderTable(users) {
    const tbody = document.getElementById('users-tbody');
    document.getElementById('total-count').textContent = users.length + ' ' + I18n.t(users.length !== 1 ? 'records' : 'record');

    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">No users found.</td></tr>';
      return;
    }

    tbody.innerHTML = users.map((u, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${esc(u.Username)}</strong></td>
        <td>${esc(u.FullName)}</td>
        <td><a href="mailto:${esc(u.Email)}">${esc(u.Email)}</a></td>
        <td><span class="badge" style="background:var(--primary);color:#fff;">${esc(u.RoleName)}</span></td>
        <td><span class="${u.IsActive ? 'badge-active' : 'badge-inactive'}">${I18n.t(u.IsActive ? 'Active' : 'Inactive')}</span></td>
        <td>${u.LastLogin ? new Date(u.LastLogin).toLocaleString() : '<span class="text-muted">Never</span>'}</td>
        <td>
          <button class="btn-action edit me-1" onclick="openEditModal(${u.UserId})" title="Edit">
            <i class="fas fa-edit"></i>
          </button>
          <button class="btn-action view me-1" onclick="openPwdModal(${u.UserId})" title="Change password">
            <i class="fas fa-key"></i>
          </button>
          <button class="btn-action ${u.IsActive ? 'delete' : 'edit'}" onclick="toggleStatus(${u.UserId})" title="${u.IsActive ? 'Disable' : 'Enable'}">
            <i class="fas fa-${u.IsActive ? 'ban' : 'check'}"></i>
          </button>
        </td>
      </tr>`).join('');
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    renderTable(allUsers.filter(u =>
      u.Username.toLowerCase().includes(q) ||
      u.FullName.toLowerCase().includes(q) ||
      u.Email.toLowerCase().includes(q) ||
      u.RoleName.toLowerCase().includes(q)
    ));
  }

  function openCreateModal() {
    document.getElementById('edit-user-id').value = '';
    document.getElementById('user-form').reset();
    document.getElementById('userModalLabel').innerHTML = '<i class="fas fa-user-plus me-2"></i>New User';
    document.getElementById('password-field').querySelector('label').innerHTML = 'Password <span class="text-danger">*</span>';
    document.getElementById('f-password').required = true;
    document.getElementById('f-active').checked = true;
    userModal().show();
  }

  function openEditModal(id) {
    const u = allUsers.find(x => x.UserId === id);
    if (!u) return;
    document.getElementById('edit-user-id').value  = id;
    document.getElementById('f-username').value    = u.Username;
    document.getElementById('f-fullname').value    = u.FullName;
    document.getElementById('f-email').value       = u.Email;
    document.getElementById('f-role').value        = u.RoleId;
    document.getElementById('f-active').checked   = u.IsActive;
    document.getElementById('f-password').value   = '';
    document.getElementById('f-password').required = false;
    document.getElementById('userModalLabel').innerHTML = '<i class="fas fa-user-edit me-2"></i>Edit User';
    userModal().show();
  }

  async function saveUser() {
    const id = document.getElementById('edit-user-id').value;
    const dto = {
      Username: document.getElementById('f-username').value.trim(),
      FullName: document.getElementById('f-fullname').value.trim(),
      Email:    document.getElementById('f-email').value.trim(),
      RoleId:   +document.getElementById('f-role').value,
      Password: document.getElementById('f-password').value,
      IsActive: document.getElementById('f-active').checked
    };

    try {
      if (id) {
        await API.users.update(id, dto);
        showToast(I18n.t('Updated.'), 'success');
      } else {
        await API.users.create(dto);
        showToast(I18n.t('Created.'), 'success');
      }
      bootstrap.Modal.getInstance(document.getElementById('userModal'))?.hide();
      await loadUsers();
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }

  function openPwdModal(id) {
    document.getElementById('pwd-user-id').value = id;
    document.getElementById('pwd-current').value  = '';
    document.getElementById('pwd-new').value      = '';
    document.getElementById('pwd-confirm').value  = '';
    document.getElementById('pwd-error').classList.add('d-none');
    pwdModal().show();
  }

  async function savePassword() {
    const id  = document.getElementById('pwd-user-id').value;
    const cur  = document.getElementById('pwd-current').value;
    const nw   = document.getElementById('pwd-new').value;
    const conf = document.getElementById('pwd-confirm').value;
    const errEl = document.getElementById('pwd-error');

    if (nw !== conf) {
      errEl.textContent = 'Passwords do not match.';
      errEl.classList.remove('d-none');
      return;
    }

    try {
      await API.users.changePassword(id, {
        CurrentPassword: cur, NewPassword: nw, ConfirmNewPassword: conf
      });
      showToast('Password changed successfully.', 'success');
      bootstrap.Modal.getInstance(document.getElementById('pwdModal'))?.hide();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('d-none');
    }
  }

  async function toggleStatus(id) {
    if (!confirm(I18n.t('Toggle status?'))) return;
    try {
      await API.users.toggleStatus(id);
      showToast(I18n.t('Status updated.'), 'success');
      await loadUsers();
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }

  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    const msgEl = document.getElementById('toast-msg');
    el.className = `toast align-items-center text-white border-0 bg-${type === 'success' ? 'success' : 'danger'}`;
    msgEl.textContent = msg;
    new bootstrap.Toast(el, { delay: 3500 }).show();
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
