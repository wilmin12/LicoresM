  // Generic fallback schema for unlisted tables
  function genericSchema(tableName) {
    return {
      label: tableName.replace(/_/g, ' '),
      apiPath: `/api/catalog/${tableName.toLowerCase()}`,
      columns: [
        { key: 'Id',          label: '#',           readonly: true },
        { key: 'Code',        label: 'Code',         type: 'text', maxlen: 20 },
        { key: 'Description', label: 'Description',  type: 'text', maxlen: 100 },
        { key: 'IsActive',    label: 'Active',        type: 'bool' },
        { key: 'CreatedAt',   label: 'Created',       type: 'datetime', readonly: true }
      ]
    };
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.requireAuth()) return;
    Auth.startExpiryWatcher();
    Auth.populateUserUI();
    Sidebar.init();

    document.getElementById('btn-logout').addEventListener('click', e => { e.preventDefault(); Auth.logout(); });

    const params = new URLSearchParams(window.location.search);
    state.tableName  = params.get('table')  || 'ORDER_STATUS';
    state.moduleCode = params.get('module') || '';

    const schema = TABLE_SCHEMAS[state.tableName] || genericSchema(state.tableName);
    state.columns = schema.columns;
    state.apiPath  = schema.apiPath;

    // Check permissions
    const user = Auth.getCurrentUser();
    const isSuperAdmin = user?.RoleName === 'SuperAdmin';
    const perm = (user?.Permissions || []).find(p =>
      p.SubmoduleCode.includes(state.moduleCode) ||
      p.SubmoduleCode.includes(state.tableName)
    );

    state.canWrite  = isSuperAdmin || !!perm?.CanWrite;
    state.canEdit   = isSuperAdmin || !!perm?.CanEdit;
    state.canDelete = isSuperAdmin || !!perm?.CanDelete;

    // Update page titles
    document.title = `${schema.label} - Licores Maduro`;
    document.getElementById('page-title').textContent = schema.label;
    document.getElementById('h-title').textContent    = schema.label;
    document.getElementById('h-subtitle').textContent = `Table: ${state.tableName} | Module: ${state.moduleCode}`;
    document.getElementById('table-label').textContent = schema.label;
    document.getElementById('bc-module').querySelector('a').textContent = state.moduleCode;
    document.getElementById('bc-table').textContent   = schema.label;

    if (state.canWrite) {
      document.getElementById('btn-create').style.display = '';
    }

    // Toolbar actions
    document.getElementById('btn-create').addEventListener('click', openCreateModal);
    document.getElementById('btn-save-record').addEventListener('click', saveRecord);
    document.getElementById('btn-export-csv').addEventListener('click', exportCsv);
    document.getElementById('search-input').addEventListener('input', debounce(loadData, 400));

    await loadData();
  });

  // ── Load data ──────────────────────────────────────────────────────────────
  async function loadData() {
    const search = document.getElementById('search-input').value;
    try {
      const qs = new URLSearchParams({ page: state.page, pageSize: state.pageSize });
      if (search) qs.set('search', search);

      const res = await API.get(`${state.apiPath}?${qs}`);

      if (res?.Data !== undefined) {
        // PagedResponse
        state.records    = res.Data;
        state.totalCount = res.TotalCount;
        state.totalPages = res.TotalPages;
      } else if (Array.isArray(res)) {
        state.records    = res;
        state.totalCount = res.length;
        state.totalPages = 1;
      } else {
        state.records = [];
      }

      document.getElementById('total-count').textContent = state.totalCount + ' records';
      renderTable();
      renderPagination();
    } catch (err) {
      showToast(err.message, 'danger');
      document.getElementById('table-container').innerHTML =
        `<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-2x mb-2"></i><br>${err.message}</div>`;
    }
  }

  // ── Render table ────────────────────────────────────────────────────────────
  function renderTable() {
    const cols    = state.columns;
    const records = state.records;
    const idKey   = cols[0]?.key || 'Id';

    let html = `<table class="table table-hover mb-0"><thead><tr>`;
    cols.forEach(c => { html += `<th>${c.label}</th>`; });
    if (state.canEdit || state.canDelete) html += `<th>Actions</th>`;
    html += `</tr></thead><tbody>`;

    if (records.length === 0) {
      html += `<tr><td colspan="${cols.length + 1}" class="text-center py-4 text-muted">No records found.</td></tr>`;
    } else {
      records.forEach(row => {
        html += '<tr>';
        cols.forEach(c => {
          let val = row[c.key];
          if (c.type === 'bool')     val = val ? '<span class="badge-active">Yes</span>' : '<span class="badge-inactive">No</span>';
          else if (c.type === 'datetime' && val) val = new Date(val).toLocaleDateString();
          else val = esc(val ?? '–');
          html += `<td>${val}</td>`;
        });
        if (state.canEdit || state.canDelete) {
          html += `<td>`;
          if (state.canEdit)   html += `<button class="btn-action edit me-1" onclick="openEditModal(${row[idKey]})" title="Edit"><i class="fas fa-edit"></i></button>`;
          if (state.canDelete) html += `<button class="btn-action delete" onclick="deleteRecord(${row[idKey]})" title="Delete"><i class="fas fa-trash"></i></button>`;
          html += `</td>`;
        }
        html += '</tr>';
      });
    }

    html += '</tbody></table>';
    document.getElementById('table-container').innerHTML = html;
    document.getElementById('pagination-info').textContent =
      `Page ${state.page} of ${state.totalPages} | ${state.totalCount} total records`;
  }

  // ── Pagination ─────────────────────────────────────────────────────────────
  function renderPagination() {
    const ul = document.getElementById('pagination');
    const tp = state.totalPages;
    if (tp <= 1) { ul.innerHTML = ''; return; }

    let html = '';
    const p = state.page;

    html += `<li class="page-item ${p===1?'disabled':''}"><a class="page-link" href="#" data-page="${p-1}">&laquo;</a></li>`;

    for (let i = Math.max(1, p-2); i <= Math.min(tp, p+2); i++) {
      html += `<li class="page-item ${i===p?'active':''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
    }

    html += `<li class="page-item ${p===tp?'disabled':''}"><a class="page-link" href="#" data-page="${p+1}">&raquo;</a></li>`;
    ul.innerHTML = html;

    ul.querySelectorAll('[data-page]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const pg = parseInt(a.dataset.page);
        if (pg >= 1 && pg <= tp) { state.page = pg; loadData(); }
      });
    });
  }

  // ── Modal helpers ──────────────────────────────────────────────────────────
  function buildForm(record = null) {
    const cols = state.columns;
    let html = '<div class="row g-3">';

    cols.forEach(c => {
      if (c.readonly) return;

      const val = record ? (record[c.key] ?? '') : '';
      html += `<div class="col-md-6">
        <label class="form-label">${c.label}${c.required ? ' <span class="text-danger">*</span>' : ''}</label>`;

      if (c.type === 'bool') {
        html += `<div class="form-check form-switch mt-1">
          <input class="form-check-input" type="checkbox" id="f-${c.key}" ${val ? 'checked' : ''} />
        </div>`;
      } else if (c.type === 'number') {
        html += `<input type="number" step="0.0001" class="form-control" id="f-${c.key}" value="${val}" ${c.required ? 'required' : ''} />`;
      } else if (c.type === 'email') {
        html += `<input type="email" class="form-control" id="f-${c.key}" value="${esc(val)}" maxlength="${c.maxlen||100}" ${c.required ? 'required' : ''} />`;
      } else if (c.type === 'date') {
        const dateVal = val ? String(val).slice(0, 10) : '';
        html += `<input type="date" class="form-control" id="f-${c.key}" value="${dateVal}" ${c.required ? 'required' : ''} />`;
      } else {
        html += `<input type="text" class="form-control" id="f-${c.key}" value="${esc(val)}" maxlength="${c.maxlen||255}" ${c.required ? 'required' : ''} />`;
      }

      html += '</div>';
    });

    html += '</div>';
    return html;
  }

  function openCreateModal() {
    state.editId = null;
    document.getElementById('recordModalLabel').innerHTML = '<i class="fas fa-plus me-2"></i>New Record';
    document.getElementById('modal-form-body').innerHTML = buildForm(null);
    new bootstrap.Modal('#recordModal').show();
  }

  function openEditModal(id) {
    const record = state.records.find(r => Object.values(r)[0] === id);
    if (!record) return;
    state.editId = id;
    document.getElementById('recordModalLabel').innerHTML = '<i class="fas fa-edit me-2"></i>Edit Record';
    document.getElementById('modal-form-body').innerHTML = buildForm(record);
    new bootstrap.Modal('#recordModal').show();
  }

  async function saveRecord() {
    const cols = state.columns;
    const dto  = {};

    cols.forEach(c => {
      if (c.readonly) return;
      const el = document.getElementById(`f-${c.key}`);
      if (!el) return;
      if (c.type === 'bool')   dto[c.key] = el.checked;
      else if (c.type === 'number') dto[c.key] = el.value !== '' ? +el.value : null;
      else                          dto[c.key] = el.value.trim() || null;
    });

    try {
      if (state.editId) {
        await API.put(`${state.apiPath}/${state.editId}`, dto);
        showToast('Record updated.', 'success');
      } else {
        await API.post(state.apiPath, dto);
        showToast('Record created.', 'success');
      }
      bootstrap.Modal.getInstance(document.getElementById('recordModal'))?.hide();
      await loadData();
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }

  async function deleteRecord(id) {
    if (!confirm('Delete this record? This action cannot be undone.')) return;
    try {
      await API.del(`${state.apiPath}/${id}`);
      showToast('Record deleted.', 'success');
      await loadData();
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }

  // ── Export CSV ─────────────────────────────────────────────────────────────
  function exportCsv() {
    const cols = state.columns;
    const rows = [cols.map(c => c.label)];
    state.records.forEach(r => {
      rows.push(cols.map(c => {
        const v = r[c.key];
        if (v === null || v === undefined) return '';
        if (typeof v === 'boolean') return v ? 'Yes' : 'No';
        return String(v).replace(/"/g, '""');
      }));
    });

    const csv   = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob  = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link  = document.createElement('a');
    link.href   = URL.createObjectURL(blob);
    link.download = `${state.tableName}_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
  }

  // ── Utilities ──────────────────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const el  = document.getElementById('toast');
    const msgEl = document.getElementById('toast-msg');
    el.className = `toast align-items-center text-white border-0 bg-${type === 'success' ? 'success' : 'danger'}`;
    msgEl.textContent = msg;
    new bootstrap.Toast(el, { delay: 3500 }).show();
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function debounce(fn, ms) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  }
</script>
</body>
</html>
