<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Apply saved theme before CSS renders to avoid flash -->
  <script>(function(){var t=localStorage.getItem('lm_theme');if(t&&t!=='wine')document.documentElement.setAttribute('data-theme',t);})();</script>
  <title>Login - Licores Maduro</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/main.css" />

  <style>
    /* Extra login-page styles */
    .login-page::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(var(--gold-rgb, 160,138,58),.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(var(--primary-rgb, 165,37,53),.25) 0%, transparent 50%);
      pointer-events: none;
    }
    .wine-line {
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--gold), var(--primary));
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }
    .error-banner {
      display: none;
      padding: .6rem 1rem;
      background: #fdecea;
      border: 1px solid #f5c6cb;
      color: #721c24;
      border-radius: var(--border-radius);
      font-size: .85rem;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">

      <!-- Logo / Brand -->
      <div class="login-logo">
        <img src="img/LogoLicores.png" alt="Licores Maduro" class="login-logo-img"/>
        <div class="brand-subtitle">Enterprise Management System</div>
      </div>

      <div class="wine-line"></div>

      <!-- Error banner -->
      <div id="error-banner" class="error-banner mb-3">
        <i class="fas fa-exclamation-triangle me-1"></i>
        <span id="error-message">Invalid credentials.</span>
      </div>

      <!-- Login Form -->
      <form id="login-form" novalidate>
        <!-- Username -->
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              placeholder="Enter your username"
              autocomplete="username"
              required />
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
              required />
            <button
              type="button"
              class="input-group-text btn"
              id="toggle-password"
              title="Show/hide password"
              style="cursor:pointer;">
              <i class="fas fa-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <div class="d-grid">
          <button type="submit" id="btn-login" class="btn btn-wine btn-lg">
            <span id="btn-login-text">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </span>
            <span id="btn-login-spinner" class="d-none">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Signing in...
            </span>
          </button>
        </div>
      </form>

      <!-- Footer note -->
      <div class="text-center mt-4">
        <small class="text-muted">
          <i class="fas fa-shield-alt me-1 text-wine"></i>
          Secured connection &mdash; Licores Maduro &copy; 2026
        </small>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/i18n.js"></script><script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Load company branding (logo + name) from API — no auth required
    (async () => {
      try {
        const res  = await fetch(API.BASE_URL + '/api/system/company-settings');
        if (!res.ok) return;
        const json = await res.json();
        const data = json?.Data || json;
        if (data?.CsLogoUrl) {
          const img = document.querySelector('.login-logo-img');
          if (img) img.src = data.CsLogoUrl + '?t=' + Date.now();
        }
        if (data?.CsCompanyName) {
          document.title = data.CsCompanyName + ' - Login';
        }
      } catch (_) { /* non-critical */ }
    })();

    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      Auth.redirectIfLoggedIn();

      // Show inactivity message if redirected due to timeout
      if (new URLSearchParams(window.location.search).get('reason') === 'inactivity') {
        const banner = document.getElementById('error-banner');
        const msg    = document.getElementById('error-message');
        if (banner && msg) {
          msg.textContent = 'Your session was closed due to inactivity (15 min).';
          banner.classList.remove('d-none');
        }
      }

      const form        = document.getElementById('login-form');
      const errorBanner = document.getElementById('error-banner');
      const errorMsg    = document.getElementById('error-message');
      const btnText     = document.getElementById('btn-login-text');
      const btnSpinner  = document.getElementById('btn-login-spinner');
      const btnLogin    = document.getElementById('btn-login');

      // Password visibility toggle
      document.getElementById('toggle-password').addEventListener('click', () => {
        const pwd  = document.getElementById('password');
        const icon = document.getElementById('eye-icon');
        if (pwd.type === 'password') {
          pwd.type = 'text';
          icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
          pwd.type = 'password';
          icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
      });

      // Form submit
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          showError('Please enter both username and password.');
          return;
        }

        setLoading(true);
        hideError();

        try {
          const result = await API.login(username, password);

          if (result?.Success) {
            // Open session for online-users tracking (non-blocking)
            Auth.openSession().catch(() => {});
            // Small delay for UX
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 300);
          } else {
            showError(result?.Errors?.[0] || result?.Message || 'Login failed.');
            setLoading(false);
          }
        } catch (err) {
          showError(err.message || 'Unable to connect to server. Please try again.');
          setLoading(false);
        }
      });

      function setLoading(loading) {
        btnLogin.disabled = loading;
        btnText.classList.toggle('d-none', loading);
        btnSpinner.classList.toggle('d-none', !loading);
      }

      function showError(msg) {
        errorMsg.textContent = msg;
        errorBanner.style.display = 'block';
      }

      function hideError() {
        errorBanner.style.display = 'none';
      }

      // Allow Enter key on username field to move to password
      document.getElementById('username').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('password').focus();
        }
      });
    });
  </script>
</body>
</html>
